name: Lint and Format Check

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check || true

      - name: Run SpotBugs
        run: mvn spotbugs:check || true

      - name: Run PMD
        run: mvn pmd:check || true

      - name: Generate Reports
        if: always()
        run: mvn site -DskipTests || true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: target/site/
          retention-days: 30
