version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ev-demand-prediction
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - JAVA_OPTS=-Xmx512m -Xms256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ev-network

  postgres:
    image: postgres:14-alpine
    container_name: ev-db
    environment:
      - POSTGRES_USER=ev_user
      - POSTGRES_PASSWORD=ev_password
      - POSTGRES_DB=ev_prediction
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-network

volumes:
  postgres_data:

networks:
  ev-network:
    driver: bridge
